name: Publish Windows Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out the release source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create the version tag
        id: version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if (-not $existingTag) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a $tag -m "ALLSTAR $version"
            git push origin $tag
          }

      - name: Build the Windows release
        run: npm run dist

      - name: Attach the release files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/ALLSTAR-Setup-${{ steps.version.outputs.version }}.exe
            dist/ALLSTAR-Setup-${{ steps.version.outputs.version }}.exe.blockmap
            dist/latest.yml
